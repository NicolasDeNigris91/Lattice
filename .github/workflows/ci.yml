name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --no-fail-fast

  doc:
    name: cargo doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Run every check (advisories, licenses, bans, sources)
          # in one pass against the workspace.
          command: check
          arguments: --all-features --workspace

  coverage:
    name: coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Run tests under llvm-cov
        run: cargo llvm-cov --workspace --all-features --no-report
      - name: Print coverage summary
        run: cargo llvm-cov report --summary-only
      - name: Export lcov
        run: |
          cargo llvm-cov report --lcov \
            --output-path lcov.info \
            --ignore-filename-regex '(tests/|benches/)'
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
          retention-days: 14
      # Optional: forward to Codecov when a CODECOV_TOKEN secret
      # is configured. Skipped silently when absent so external
      # contributors' fork PRs do not fail on a missing secret.
      - name: Upload to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  fuzz:
    name: fuzz (nightly, warn-only)
    runs-on: ubuntu-latest
    # Quick smoke run of each fuzz target on every PR. 30 seconds
    # per target catches obvious panics without blocking PRs on
    # the slow exhaustive sweeps that belong to a longer schedule.
    # `continue-on-error` keeps the job informational; a real
    # finding shows in the run but does not gate the PR.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        target: [wal_open, sstable_open, manifest_open, engine_history]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/lattice-core/fuzz
          key: ${{ matrix.target }}
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Smoke run ${{ matrix.target }}
        working-directory: crates/lattice-core/fuzz
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} \
            -- -max_total_time=30 -timeout=10

  miri:
    name: miri (nightly, warn-only)
    runs-on: ubuntu-latest
    # Miri catches undefined behaviour and aliasing violations.
    # The job is informational; failures show up in the run but do
    # not block CI. Lattice is `forbid(unsafe_code)`, so any miri
    # finding here is either a bug in a dependency or a Stacked
    # Borrows violation in std that miri considers diagnostic.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Setup miri
        run: cargo miri setup
      # Scope: lib unit tests only. Integration tests touch the
      # filesystem, which miri can run with -Zmiri-disable-isolation
      # but the wall-clock cost is prohibitive for a per-PR job.
      - name: Run unit tests under miri
        run: cargo miri test --workspace --lib
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-permissive-provenance"

  msrv:
    name: msrv (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lowest supported toolchain per `rust-version` in Cargo.toml.
        # Compiling under it (with --all-features so the optional
        # `tokio` wrapper is included) catches accidental use of
        # newer std items before a release.
        toolchain: ["1.85"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --all-features

  loom:
    name: loom (model checking)
    runs-on: ubuntu-latest
    # Drives the conflict-tracker state machine under every legal
    # interleaving of two and three threads via the `loom` crate.
    # Linux-only because loom's combinatorial cost on a slower
    # Windows runner is not worth the redundancy. The suite lives
    # in its own workspace member so the `--cfg loom` flag does
    # not collide with `tokio` (which itself uses loom and only
    # builds under specific feature flags).
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run loom tests
        run: cargo test -p lattice-loom-tests --release
        env:
          RUSTFLAGS: "--cfg loom"

  book:
    name: mdbook build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - run: mdbook build book
