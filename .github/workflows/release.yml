name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish-crate:
    name: cargo publish
    # Pre-1.0 tags ship only as GitHub releases. crates.io publication
    # is reserved for stable releases per the project roadmap.
    if: ${{ !startsWith(github.ref_name, 'v0.') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          grep -q "version = \"$VERSION\"" Cargo.toml || (echo "tag $GITHUB_REF_NAME does not match workspace version"; exit 1)

      - name: Check for crates.io token
        id: token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$CARGO_REGISTRY_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CARGO_REGISTRY_TOKEN is not set on this repository; skipping cargo publish. See DEPLOY.md."
          fi

      - name: Publish lattice-core
        if: steps.token.outputs.present == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p lattice-core

      - name: Publish lattice-cli
        if: steps.token.outputs.present == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p lattice-cli

  github-release:
    name: GitHub release notes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release from CHANGELOG
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
