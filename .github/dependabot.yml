version: 2
updates:
  # Cargo dependencies. Group dev-deps and patch updates so we get
  # one PR per category per week instead of a flood.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        dependency-type: development
      patches:
        update-types:
          - patch
    labels:
      - "deps"
      - "cargo"
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # GitHub Actions versions. Pin-bumps land here.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "actions"
    commit-message:
      prefix: "chore(actions)"
      include: scope
