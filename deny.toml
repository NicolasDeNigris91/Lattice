# cargo-deny configuration.
#
# Audits the dependency tree for advisories, licenses, duplicates,
# and source registries. Run locally with `cargo deny check`. See
# https://embarkstudios.github.io/cargo-deny/ for the full schema.

[graph]
all-features = true

[output]
feature-depth = 1

# Advisories: yanked crates and unpatched RustSec advisories fail
# the build. Informational notices warn so they show in the report
# without blocking CI.
[advisories]
version = 2
yanked = "deny"
ignore = []

# Licenses: explicit allow list. Anything outside is rejected.
# Lattice itself is dual MIT/Apache-2.0; transitively we accept
# the standard permissive set plus a few exceptions used by tokio,
# unicode tables, and the lz4 family.
[licenses]
version = 2
confidence-threshold = 0.95
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

# Duplicates and shape of the dep graph. Multiple versions of the
# same crate are warned (a real concern for binary size and audit
# surface) but not denied: the ecosystem is too active to keep a
# clean line in CI without a maintenance treadmill. Wildcards are
# rejected because they break reproducibility.
[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []
skip-tree = []

# Sources: only the public crates.io registry. Git deps are denied
# so a contribution cannot quietly add an unaudited dependency.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
