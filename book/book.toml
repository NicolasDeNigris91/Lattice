[book]
authors = ["Nicolas Pilegi De Nigris"]
language = "en"
multilingual = false
src = "src"
title = "Lattice, by hand"
description = "Building an LSM-tree storage engine from scratch in Rust."

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/NicolasDeNigris91/Lattice"
edit-url-template = "https://github.com/NicolasDeNigris91/Lattice/edit/main/book/{path}"
mathjax-support = false
copy-fonts = true

[output.html.fold]
enable = true
level = 1

[output.html.playground]
runnable = false
